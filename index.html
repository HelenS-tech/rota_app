<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SmartShift</title>

    <link rel="icon" type="image/png" href="favicon.png?v=3" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
    <link rel="stylesheet" href="style.css?v4" />
  </head>

  <body>
    <img src="images/SS_logo_slim.png" alt="SmartShift logo" class="logo" />
    <p class="tagline">Keep every shift covered</p>
    <p class="venue-name">The Crystal Ship</p>
    <div class="user-bar">
      <span>Logged in as:</span>
      <select id="staffSelect"></select>
    </div>
    <button id="logoutBtn">Logout</button>
    <div id="claimStatus"></div>
    <div id="cancelledShiftAlert"></div>
    <div id="unclaimedShiftAlert"></div>
    <button id="finishedBtn">I have finished choosing</button>

    <section id="mainMonthView" class="main-month-view"></section>

    <div id="shifts"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
